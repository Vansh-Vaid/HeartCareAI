{% extends "base.html" %}
{% block title %}Login – HeartCare AI{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="brand-icon mx-auto mb-3" style="width:60px;height:60px;font-size:28px;border-radius:16px;">
        <i class="bi bi-heart-pulse-fill"></i>
      </div>
      <h2 class="fw-bold mb-1">Welcome back</h2>
      <p class="text-muted small">Sign in to view screenings, reports, and follow-up details.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="pwd" class="form-control" placeholder="Enter your password" required />
          <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
            <i class="bi bi-eye" id="pwd-icon"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember" />
          <label class="form-check-label small" for="remember">Keep me signed in</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      New here?
      <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePwd() {
  const pwd = document.getElementById('pwd');
  const icon = document.getElementById('pwd-icon');
  if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
