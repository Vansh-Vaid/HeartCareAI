{% extends "base.html" %}
{% block title %}Edit Doctor – Admin{% endblock %}
{% block content %}
<div class="container section-py" style="max-width:700px;">
  <div class="mb-4">
    <a href="{{ url_for('admin.doctors') }}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Doctors</a>
  </div>
  <div class="hc-card">
    <div class="card-header"><i class="bi bi-pencil me-2 text-primary"></i>Edit Doctor – {{ doc.name }}</div>
    <div class="card-body">
      <form method="POST">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ doc.name }}" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Specialization</label>
            <input type="text" name="specialization" class="form-control" value="{{ doc.specialization }}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Experience (years)</label>
            <input type="number" name="experience" class="form-control" value="{{ doc.experience }}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ doc.phone }}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Hospital</label>
            <input type="text" name="hospital" class="form-control" value="{{ doc.hospital }}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Available</label>
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" name="available" id="avail"
                     {% if doc.available %}checked{% endif %} />
              <label class="form-check-label" for="avail">Available for patients</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Bio</label>
            <textarea name="bio" class="form-control" rows="3">{{ doc.bio }}</textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label>
            <input type="text" name="new_password" class="form-control" placeholder="New password..." />
          </div>
        </div>
        <hr class="divider my-4" />
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg me-2"></i>Save Changes</button>
          <a href="{{ url_for('admin.doctors') }}" class="btn btn-outline-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
