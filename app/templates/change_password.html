{% extends "base.html" %}
{% block title %}Change Password – HeartCare AI{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-key-fill fs-1 text-primary mb-3 d-block"></i>
      <h2 class="fw-bold mb-1">Change Password</h2>
      <p class="text-muted small">Update your account password</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Current Password</label>
        <input type="password" name="old_password" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Update Password</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('main.index') }}" class="text-muted small">Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
