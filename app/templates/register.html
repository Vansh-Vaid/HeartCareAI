{% extends "base.html" %}
{% block title %}Register – HeartCare AI{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px;">
    <div class="text-center mb-4">
      <div class="brand-icon mx-auto mb-3" style="width:60px;height:60px;font-size:28px;border-radius:16px;">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h2 class="fw-bold mb-1">Create your account</h2>
      <p class="text-muted small">Set up a patient account to save screenings and reports.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-at"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="name@example.com" required />
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required minlength="6" />
        </div>
        <div class="col-6">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-person-check me-2"></i>Create account
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
